name: CI

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-2022
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Create signing certificate
        id: sign-cert
        shell: pwsh
        run: |
          $certDir = "certs"
          $pfx = "$certDir\xfiles.pfx"
          $cer = "$certDir\xfiles.cer"
          $certPass = "dev"

          if (-not (Test-Path $pfx)) {
            New-Item -ItemType Directory -Path $certDir -Force | Out-Null
            $secPass = ConvertTo-SecureString $certPass -AsPlainText -Force
            $cert = New-SelfSignedCertificate -Subject "CN=X-Files" -FriendlyName "xfiles" `
              -Type CodeSigningCert -KeyUsage DigitalSignature `
              -TextExtension @("2.5.29.37={text}1.3.6.1.5.5.7.3.3") `
              -CertStoreLocation Cert:\CurrentUser\My
            Export-PfxCertificate -Cert $cert -FilePath $pfx -Password $secPass -Force | Out-Null
            Export-Certificate -Cert $cert -FilePath $cer -Type CERT -Force | Out-Null
            Write-Host "Cert created: thumbprint=$($cert.Thumbprint)"
            echo "cert_thumbprint=$($cert.Thumbprint)" >> $env:GITHUB_OUTPUT
          } else {
            $cert = New-Object System.Security.Cryptography.X509Certificates.X509Certificate2($pfx, $certPass)
            Write-Host "Cert exists: thumbprint=$($cert.Thumbprint)"
            echo "cert_thumbprint=$($cert.Thumbprint)" >> $env:GITHUB_OUTPUT
          }

      - name: Sync version from tag
        if: startsWith(github.ref, 'refs/tags/v')
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}" -replace '^v',''
          $parts = $tag -split '\.'
          if ($parts.Count -eq 4) {
            $target = [int]$parts[3]
            $pre = $target - 1
            Set-Content -Path "build_counter.txt" -Value $pre -NoNewline
            Write-Host "Set build_counter.txt to $pre (PreBuildEvent will increment to $target)"
          }

      - name: Setup NuGet
        uses: nuget/setup-nuget@v2

      - name: Restore NuGet packages
        run: nuget restore XFiles.sln

      - name: Build
        shell: pwsh
        run: |
          $thumb = "${{ steps.sign-cert.outputs.cert_thumbprint }}"
          msbuild "XFiles.sln" `
            /p:Configuration=Release `
            /p:Platform=x64 `
            /p:PackageCertificateKeyFile=certs\xfiles.pfx `
            /p:PackageCertificatePassword=dev `
            /p:PackageCertificateThumbprint=$thumb `
            /nowarn:MSB4011 /m /nologo

      - name: Package
        shell: pwsh
        run: |
          .\scripts\package.ps1 -Configuration Release -Platform x64 -SkipBuild

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: xfiles-${{ github.sha }}
          path: AppPackages/*.zip
          compression-level: 0

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: windows-2022
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          path: artifact/

      - name: Get version from tag
        id: tag
        shell: bash
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: X-Files v${{ steps.tag.outputs.VERSION }}
          body_path: RELEASE-NOTES.md
          files: artifact/**/*.zip
